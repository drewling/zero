display_information:
  name: Mail Draft Review
  description: Review and approve AI-drafted Gmail replies from Slack.
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: Mail Draft Review
    always_online: true

settings:
  socket_mode_enabled: true
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.customize
      - im:write
