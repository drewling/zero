<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>inbox-keeper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="panel" aria-busy="false">
    <header class="topbar">
      <div class="wordmark">
        <span class="glyph" aria-hidden="true"></span>
        <span class="name">inbox<span class="dim">·</span>keeper</span>
      </div>
      <div class="accounts-strip" id="accounts-strip" role="tablist" aria-label="Accounts"></div>
    </header>

    <nav class="segmented" id="nav" role="tablist" aria-label="Views">
      <button class="seg" data-view="loops" role="tab" aria-selected="true">Open loops</button>
      <button class="seg" data-view="accounts" role="tab" aria-selected="false">Accounts</button>
      <button class="seg" data-view="undo" role="tab" aria-selected="false">Undo</button>
      <button class="seg" data-view="policy" role="tab" aria-selected="false">Policy</button>
    </nav>

    <section class="view" id="view" tabindex="-1"></section>

    <footer class="actionbar" id="actionbar"></footer>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
